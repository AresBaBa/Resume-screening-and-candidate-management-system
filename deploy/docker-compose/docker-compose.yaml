version: '3.8'

networks:
  xczs-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  db:
    image: postgres:15-alpine
    container_name: xczs-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ares123
      POSTGRES_DB: resume_screening
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - xczs-network

  redis:
    image: redis:7-alpine
    container_name: xczs-redis
    command: redis-server --requirepass ares123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ares123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - xczs-network

  backend:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.backend
    container_name: xczs-backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://postgres:ares123@db:5432/resume_screening
      REDIS_URL: redis://:ares123@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: http://frontend:3000,http://admin:80
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - xczs-network

  frontend:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.frontend
    container_name: xczs-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - xczs-network

  admin:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.admin
    container_name: xczs-admin
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - xczs-network
